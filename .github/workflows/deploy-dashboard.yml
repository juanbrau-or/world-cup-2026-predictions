name: Deploy Static Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Operational Predictions"]
    types: [completed]
  schedule:
    - cron: "30 */12 * * *"

concurrency:
  group: world-cup-2026-static-dashboard
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check Operational Predictions success
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            conclusion="${{ github.event.workflow_run.conclusion }}"
            run_url="${{ github.event.workflow_run.html_url }}"
            if [ "${conclusion}" != "success" ]; then
              echo "Operational Predictions did not succeed: ${conclusion}" >&2
              echo "Run: ${run_url}" >&2
              exit 1
            fi
            echo "Operational Predictions succeeded: ${run_url}"
          else
            conclusion="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow operational-predictions.yml --branch main --limit 1 --json conclusion --jq '.[0].conclusion')"
            if [ "${conclusion}" != "success" ]; then
              echo "Latest Operational Predictions run on main did not succeed: ${conclusion}" >&2
              exit 1
            fi
            echo "Latest Operational Predictions run on main succeeded."
          fi

      - name: Checkout main
        uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Fetch predictions-data
        shell: bash
        run: |
          set -euo pipefail
          git fetch --depth=1 origin predictions-data
          mkdir -p predictions-data
          git archive origin/predictions-data | tar -x -C predictions-data
          test -f predictions-data/manifest.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Validate and build dashboard
        run: uv run wc2026 site build --data-root predictions-data --output-root site-dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site-dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "### Static dashboard deployed"
            echo
            echo "URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
