project:
  random_seed: 2026
  timezone: UTC

validation:
  strategy: expanding_window
  primary_metrics:
    - log_loss
    - brier_score
    - ranked_probability_score

elo:
  initial_rating: 1500
  k_base: 20
  home_advantage: 75
  competition_importance:
    friendly: 1
    world_cup_qualifier: 4
    confederation_qualifier: 3
    world_cup: 5
    confederation_championship: 4
    nations_league: 2
    other_official: 2
    other: 1
  margin_of_victory:
    enabled: false
    goal_difference_weight: 0.0
  rating_regression_after_inactivity:
    enabled: false
    inactivity_days: 365
    regression_fraction: 0.0
  model_version: elo_v1
  input_matches_path: data/processed/modeling_matches.parquet
  output_match_ratings_path: data/processed/elo_match_ratings.parquet
  output_current_ratings_path: data/processed/elo_current_ratings.parquet
  report_output: data/interim/elo_ratings_report.json

elo_evaluation:
  input_matches_path: data/processed/modeling_matches.parquet
  random_seed: 2026
  calibration_bins: 10
  final_holdout_start: "2026-01-01"
  folds_version: tournament_validation_v1
  folds:
    - name: world_cup_2018
      start: "2018-06-14"
      end: "2018-07-15"
      competitions:
        - FIFA World Cup
    - name: world_cup_2022
      start: "2022-11-20"
      end: "2022-12-18"
      competitions:
        - FIFA World Cup
    - name: euro_2024
      start: "2024-06-14"
      end: "2024-07-14"
      competitions:
        - UEFA Euro
    - name: copa_america_2024
      start: "2024-06-20"
      end: "2024-07-14"
      competitions:
        - Copa América
  search:
    k_base:
      - 15
      - 20
      - 25
    home_advantage:
      - 50
      - 75
    competition_weight_profiles:
      - name: default
        weights:
          friendly: 1
          world_cup_qualifier: 4
          confederation_qualifier: 3
          world_cup: 5
          confederation_championship: 4
          nations_league: 2
          other_official: 2
          other: 1
      - name: compressed
        weights:
          friendly: 1
          world_cup_qualifier: 2
          confederation_qualifier: 2
          world_cup: 3
          confederation_championship: 3
          nations_league: 2
          other_official: 2
          other: 1
    margin_of_victory:
      - name: "off"
        enabled: false
        goal_difference_weight: 0.0
      - name: modest
        enabled: true
        goal_difference_weight: 0.15
    rating_regression_after_inactivity:
      - name: "off"
        enabled: false
        inactivity_days: 365
        regression_fraction: 0.0
      - name: two_years_10pct
        enabled: true
        inactivity_days: 730
        regression_fraction: 0.10
  outputs:
    root: artifacts/evaluation/elo
    selected_config_path: artifacts/evaluation/elo/selected_config.json
    search_metrics_path: artifacts/evaluation/elo/search_metrics.csv
    metrics_by_fold_path: artifacts/evaluation/elo/metrics_by_fold.csv
    segment_metrics_path: artifacts/evaluation/elo/metrics_by_segment.csv
    out_of_fold_predictions_path: artifacts/evaluation/elo/predictions_out_of_fold.parquet
    holdout_2026_predictions_path: artifacts/evaluation/elo/predictions_2026_holdout.parquet
    calibration_curves_path: artifacts/evaluation/elo/calibration_curves.csv
    report_path: artifacts/evaluation/elo/report.md

poisson:
  max_goals: 10
  time_decay_half_life_days: 365

dixon_coles:
  model_version: poisson_goal_v1
  input_matches_path: data/processed/modeling_matches.parquet
  output_model_path: artifacts/models/dixon_coles/model.json
  report_output: artifacts/models/dixon_coles/report.json
  final_holdout_start: "2026-01-01"
  model_type: poisson
  time_decay_half_life_days: 730
  regularization_strength: 0.05
  max_goals: 10

dixon_coles_evaluation:
  input_matches_path: data/processed/modeling_matches.parquet
  random_seed: 2026
  bootstrap_iterations: 10000
  search:
    model_types:
      - poisson
      - dixon_coles
    half_life_days:
      - 180
      - 365
      - 730
      - null
    regularization_strength:
      - 0.05
    max_goals: 10
  selection:
    selected_model_type: poisson
    selected_half_life_days: 730
    regularization_strength: 0.05
    max_goals: 10
    folds_version: tournament_validation_v1
    selected_by: mean_validation_log_loss
    metrics:
      - log_loss
      - brier_score
      - ranked_probability_score
  outputs:
    root: artifacts/evaluation/dixon_coles
    selected_config_path: artifacts/evaluation/dixon_coles/selected_config.json
    search_metrics_path: artifacts/evaluation/dixon_coles/search_metrics.csv
    metrics_by_fold_path: artifacts/evaluation/dixon_coles/metrics_by_fold.csv
    comparison_with_elo_path: artifacts/evaluation/dixon_coles/comparison_with_elo.csv
    fold_report_path: artifacts/evaluation/dixon_coles/fold_report.csv
    paired_match_comparisons_path: artifacts/evaluation/dixon_coles/paired_match_comparisons.csv
    paired_comparison_summary_path: artifacts/evaluation/dixon_coles/paired_comparison_summary.csv
    evaluation_summary_path: artifacts/evaluation/dixon_coles/evaluation_summary.json
    out_of_fold_predictions_path: artifacts/evaluation/dixon_coles/predictions_out_of_fold.parquet
    holdout_2026_predictions_path: artifacts/evaluation/dixon_coles/predictions_2026_holdout.parquet
    report_path: artifacts/evaluation/dixon_coles/report.md

contextual_challenger:
  schema_version: contextual_challenger_config_v1
  official_baseline_model_version: poisson_goal_v1
  sanity_model_name: contextual_logit_v1
  primary_model_name: contextual_lgbm_v1
  shadow_prediction_context: shadow_contextual_v1
  input_matches_path: data/processed/modeling_matches.parquet
  contextual_match_features_path: data/processed/contextual_features/match_contextual_features.parquet
  feature_whitelist_path: configs/contextual_challenger_features.yaml
  final_holdout_start: "2026-01-01"
  folds_version: tournament_validation_v1
  random_seed: 2026
  bootstrap_iterations: 5000
  max_threads: 2
  split:
    tuning_window_days: 730
    calibration_window_days: 365
    minimum_train_matches: 500
    base_oof_blocks: 5
  calibration:
    method: temperature_scaling
    candidate_temperatures:
      - 0.75
      - 0.9
      - 1.0
      - 1.1
      - 1.25
      - 1.5
      - 2.0
  logistic_grid:
    - name: logit_c_0_3
      c: 0.3
      max_iter: 1000
    - name: logit_c_1_0
      c: 1.0
      max_iter: 1000
  lightgbm_grid:
    - name: lgbm_compact
      learning_rate: 0.05
      n_estimators: 160
      num_leaves: 15
      max_depth: 4
      min_child_samples: 40
      feature_fraction: 0.9
      bagging_fraction: 0.9
      bagging_freq: 1
      reg_alpha: 0.0
      reg_lambda: 1.0
    - name: lgbm_regularized
      learning_rate: 0.04
      n_estimators: 220
      num_leaves: 31
      max_depth: 5
      min_child_samples: 60
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 1
      reg_alpha: 0.05
      reg_lambda: 2.0
  shadow_selection:
    selected_model_name: contextual_logit_v1
    selected_ablation: contextual_logistic
    selected_feature_set: contextual_level_a_v1
    selected_hyperparameters:
      name: logit_c_1_0
      c: 1.0
      max_iter: 1000
    calibration_method: temperature_scaling
    training_cutoff: "2026-01-01"
    promotion_status: shadow_monitoring
  outputs:
    root: artifacts/evaluation/contextual_challenger
    selected_config_path: artifacts/evaluation/contextual_challenger/selected_config.json
    model_manifest_path: artifacts/evaluation/contextual_challenger/model_manifest.json
    fold_metrics_path: artifacts/evaluation/contextual_challenger/fold_metrics.csv
    segment_metrics_path: artifacts/evaluation/contextual_challenger/segment_metrics.csv
    paired_comparison_path: artifacts/evaluation/contextual_challenger/paired_comparison.csv
    bootstrap_report_path: artifacts/evaluation/contextual_challenger/bootstrap_report.json
    calibration_report_path: artifacts/evaluation/contextual_challenger/calibration_report.json
    ablation_report_path: artifacts/evaluation/contextual_challenger/ablation_report.csv
    feature_importance_path: artifacts/evaluation/contextual_challenger/feature_importance.csv
    out_of_fold_predictions_path: artifacts/evaluation/contextual_challenger/predictions_out_of_fold.parquet
    holdout_2026_predictions_path: artifacts/evaluation/contextual_challenger/predictions_2026_holdout.parquet
    report_path: artifacts/evaluation/contextual_challenger/report.md
