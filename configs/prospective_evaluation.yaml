schema_version: prospective_evaluation_config_v1
result_metric_basis: result_90
minimum_calibration_matches: 30
small_sample_warning_threshold: 30

horizons:
  version: prediction_horizons_v1
  purpose: >
    Monitoring buckets for prediction lead time. They keep all snapshots for descriptive analysis
    and do not define the official metric by themselves.
  buckets:
    - id: gt_24h
      label: "> 24 hours before kickoff"
      min_hours: 24
      min_inclusive: false
      max_hours: null
      max_inclusive: false
    - id: 6_to_24h
      label: "6 to 24 hours before kickoff"
      min_hours: 6
      min_inclusive: true
      max_hours: 24
      max_inclusive: true
    - id: 1_to_6h
      label: "1 to less than 6 hours before kickoff"
      min_hours: 1
      min_inclusive: true
      max_hours: 6
      max_inclusive: false
    - id: lt_1h
      label: "Less than 1 hour before kickoff"
      min_hours: 0
      min_inclusive: true
      max_hours: 1
      max_inclusive: false

official_selection:
  policy_id: early_v1
  policy_version: early_v1_2026_06_30
  prediction_context: early_v1
  primary_rule:
    id: latest_valid_at_least_6h_before_kickoff
    min_hours_before_kickoff: 6
  fallback_rule:
    id: earliest_valid_before_kickoff

baselines:
  uniform_1x2:
    enabled: true
  historical_frequency:
    enabled: true
    input_matches_path: data/processed/modeling_matches.parquet
    cutoff_utc: "2026-01-01T00:00:00Z"
  elo_operational:
    enabled: false
